name: Weekly Founder Sourcing Pipeline

on:
  schedule:
    - cron: "30 4 * * 1"
  workflow_dispatch:

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Source Assets
        uses: actions/checkout@v4

      - name: Initialize Environment Manager (uv)
        uses: astral-sh/setup-uv@v5

      - name: Provision Python Runtime Environment
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Deploy Script Dependency Tree
        run: uv pip install --system groq tavily-python gspread requests

      - name: Create Google Service Account Key
        run: |
          echo '${{ secrets.GCP_SA_KEY }}' > credentials.json

      - name: Orchestrate Pipeline Runtime Execution
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
          SENDER_PASSWORD: ${{ secrets.SENDER_PASSWORD }}
          RECEIVER_EMAIL: ${{ secrets.RECEIVER_EMAIL }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python script.py

      - name: Delete Service Account Key
        if: always()
        run: rm -f credentials.json

      - name: Persist Sourcing Report Data
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sourcing-intelligence-data
          path: sourcing_report.json

      - name: Commit Cross-Run Ledger
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/state/seen_startups.json
          if git diff --cached --quiet; then
            echo "No ledger changes to commit."
          else
            git commit -m "chore: update seen_startups ledger [skip ci]"
            git push
          fi
